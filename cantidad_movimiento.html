<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Cantidad de movimiento · ejercicios — Tercial</title>

  <script>
    /* Anti-flash · ver design-system § 11 */
    (function () {
      var p = localStorage.getItem('tercial-theme-pref') || 'auto';
      var d = p === 'auto'
        ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : p;
      var r = document.documentElement;
      r.setAttribute('data-theme', d);
      r.setAttribute('data-theme-pref', p);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap">

  <link rel="stylesheet" href="/tercial/assets/css/tokens.css">
  <link rel="stylesheet" href="/tercial/assets/css/base.css">
  <link rel="stylesheet" href="/tercial/assets/css/components.css">

  <script defer src="/tercial/assets/js/theme.js"></script>
  <script defer src="/tercial/assets/js/site-nav.js"></script>
</head>
<body>

<site-nav active="fisica"></site-nav>

<main class="container container--base">

  <header class="hero" data-cat="blue">
    <p class="eyebrow">Unidad · Física</p>
    <h1 class="hero__title">Cantidad de <em>movimiento</em></h1>
    <p class="hero__lede">
      Momento lineal, impulso, choques elásticos e inelásticos, coeficiente de restitución y centro de masa. Toca cada ejercicio para revelar su respuesta.
    </p>
  </header>

  <div id="contenido"></div>

</main>

<footer class="site-footer">
  <p class="site-footer__brand"><em>Tercial</em> · preparación examen UNAM</p>
  <p class="site-footer__credits">Compuesto en <em>Fraunces</em> e IBM Plex Sans · 2026</p>
  <nav class="site-footer__links" aria-label="enlaces de pie">
    <a href="/tercial/">Inicio</a>
    <a href="/tercial/uni.html#fisica">Más física</a>
  </nav>
</footer>

<script>
const SECCIONES = [

  { titulo: 'Cantidad de movimiento (momento lineal)', ejercicios: [
    { n:'01', t:'¿Cuál es la cantidad de movimiento de un cuerpo de 5 kg que se mueve a 4 m/s?',
      d:'p = mv',
      r:'p = 20 kg·m/s' },
    { n:'02', t:'Un balón de 0.5 kg viaja a 12 m/s. ¿Cuál es su cantidad de movimiento?',
      d:'p = mv',
      r:'p = 6 kg·m/s' },
    { n:'03', t:'Un coche tiene cantidad de movimiento de 30 000 kg·m/s al moverse a 30 m/s. ¿Cuál es su masa?',
      d:'m = p/v',
      r:'m = 1 000 kg' },
    { n:'04', t:'Si un objeto duplica su velocidad, ¿qué pasa con su momento lineal?',
      d:'p ∝ v',
      r:'También se duplica' },
    { n:'05', t:'¿Cuál es la cantidad de movimiento de un objeto en reposo?',
      d:'v = 0',
      r:'p = 0' },
  ]},

  { titulo: 'Impulso', ejercicios: [
    { n:'01', t:'Una fuerza de 50 N actúa durante 4 s sobre un objeto. ¿Cuál es el impulso?',
      d:'J = F·Δt',
      r:'J = 200 N·s' },
    { n:'02', t:'Un objeto de 2 kg cambia su velocidad de 3 m/s a 8 m/s. ¿Cuál es el cambio en su cantidad de movimiento?',
      d:'Δp = m·Δv',
      r:'Δp = 10 kg·m/s' },
    { n:'03', t:'¿En qué unidades se mide el impulso?',
      d:'J = Δp, así que tienen las mismas unidades',
      r:'N·s = kg·m/s' },
    { n:'04', t:'Una pelota de 0.2 kg se mueve a 10 m/s y rebota con la misma rapidez en sentido opuesto. ¿Cuál es la magnitud del cambio en su momento lineal?',
      d:'Δp = m(v<sub>f</sub> − v<sub>i</sub>); cuidado con los signos',
      r:'|Δp| = 4 kg·m/s' },
    { n:'05', t:'Si un balón de 0.5 kg recibe un impulso de 6 N·s, ¿cuál es el cambio en su velocidad?',
      d:'Δv = J/m',
      r:'Δv = 12 m/s' },
    { n:'06', t:'Una fuerza constante de 10 N actúa durante 5 s sobre un objeto de 2 kg que parte del reposo. ¿Cuál es su velocidad final?',
      d:'J = F·Δt = m·Δv',
      r:'v = 25 m/s' },
    { n:'07', t:'Un balón de 0.4 kg golpea una pared con velocidad 10 m/s y rebota con 8 m/s en sentido opuesto. ¿Cuál es la magnitud del impulso recibido?',
      d:'J = m(v<sub>f</sub> − v<sub>i</sub>); cuidado con los signos',
      r:'|J| = 7.2 N·s' },
  ]},

  { titulo: 'Conservación del momento (choques)', ejercicios: [
    { n:'01', t:'Un objeto A de 3 kg con velocidad 4 m/s choca contra un objeto B de 1 kg en reposo y quedan unidos. ¿Cuál es la velocidad final del conjunto?',
      d:'m<sub>A</sub>v<sub>A</sub> = (m<sub>A</sub>+m<sub>B</sub>)v<sub>f</sub>',
      r:'v<sub>f</sub> = 3 m/s' },
    { n:'02', t:'Dos cuerpos de 4 kg cada uno se mueven uno hacia el otro a 5 m/s y −2 m/s. Si chocan y se quedan unidos, ¿cuál es la velocidad final?',
      d:'p<sub>total</sub> = m<sub>A</sub>v<sub>A</sub> + m<sub>B</sub>v<sub>B</sub>',
      r:'v<sub>f</sub> = 1.5 m/s' },
    { n:'03', t:'Una pelota de 2 kg viaja a 8 m/s y choca contra otra de 6 kg en reposo. La primera rebota a −2 m/s. ¿Cuál es la velocidad de la segunda después?',
      d:'Conservación: p<sub>i</sub> = p<sub>f</sub>',
      r:'v₂ ≈ 3.33 m/s' },
    { n:'04', t:'¿Qué tipo de choque conserva la energía cinética?',
      d:'Hay dos categorías principales',
      r:'Choque elástico (perfecto)' },
    { n:'05', t:'¿Qué tipo de choque NO conserva la energía cinética pero sí el momento?',
      d:'Parte de la E<sub>c</sub> se convierte en otras formas (calor, deformación)',
      r:'Choque inelástico' },
    { n:'06', t:'Un cuerpo de 1 kg a 10 m/s choca elásticamente contra otro de 1 kg en reposo. ¿Cuáles son las velocidades finales?',
      d:'En choque elástico de masas iguales, intercambian velocidades',
      r:"v₁' = 0 &nbsp;·&nbsp; v₂' = 10 m/s" },
    { n:'07', t:'Dos vagones de tren de 2 000 kg y 3 000 kg se mueven en la misma dirección a 5 m/s y 2 m/s. Si se enganchan al chocar, ¿cuál es la velocidad final?',
      d:'p<sub>total</sub> = m<sub>1</sub>v<sub>1</sub> + m<sub>2</sub>v<sub>2</sub>; luego v<sub>f</sub> = p/m<sub>total</sub>',
      r:'v<sub>f</sub> = 3.2 m/s' },
    { n:'08', t:'Un proyectil de 0.5 kg viaja a 200 m/s y se incrusta en un bloque de 9.5 kg en reposo. ¿Cuál es la velocidad final del conjunto?',
      d:'Choque perfectamente inelástico',
      r:'v<sub>f</sub> = 10 m/s' },
    { n:'09', t:'Un coche de 1 500 kg a 20 m/s choca y queda enganchado a otro de 1 000 kg en reposo. ¿Velocidad final del conjunto?',
      d:'Inelástico: m₁v₁ = (m₁+m₂)v<sub>f</sub>',
      r:'v<sub>f</sub> = 12 m/s' },
  ]},

  { titulo: 'Coeficiente de restitución', ejercicios: [
    { n:'01', t:'¿Qué valor del coeficiente de restitución corresponde a un choque perfectamente elástico?',
      d:'e = velocidad relativa de separación / velocidad relativa de aproximación',
      r:'e = 1 (la velocidad relativa se conserva en magnitud)' },
    { n:'02', t:'¿Qué valor de e corresponde a un choque perfectamente inelástico (los cuerpos quedan unidos)?',
      d:'Si quedan unidos, no hay separación',
      r:'e = 0' },
    { n:'03', t:'Una pelota cae desde 4 m sobre el suelo y rebota hasta 1 m. ¿Cuál es el coeficiente de restitución con el suelo?',
      d:'e = √(h<sub>rebote</sub>/h<sub>caída</sub>)',
      r:'e = 0.5' },
    { n:'04', t:'Una pelota choca contra el suelo con velocidad 8 m/s y rebota con 6 m/s. Calcula e.',
      d:'e = |v<sub>f</sub>|/|v<sub>i</sub>|',
      r:'e = 0.75' },
    { n:'05', t:'Dos cuerpos chocan en línea recta con coeficiente de restitución 0.4. La velocidad relativa de aproximación era 10 m/s. ¿Cuál es la velocidad relativa de separación?',
      d:'v<sub>sep</sub> = e · v<sub>aprox</sub>',
      r:'v<sub>sep</sub> = 4 m/s' },
  ]},

  { titulo: 'Centro de masa y aplicaciones', ejercicios: [
    { n:'01', t:'Encuentra el centro de masa de dos partículas: m₁ = 2 kg en x = 0 y m₂ = 3 kg en x = 10 m.',
      d:'x<sub>cm</sub> = (m₁x₁ + m₂x₂)/(m₁ + m₂)',
      r:'x<sub>cm</sub> = 6 m' },
    { n:'02', t:'Dos cuerpos de masas iguales están en x = 2 m y x = 8 m. ¿Dónde está el centro de masa?',
      d:'Para masas iguales, en el punto medio',
      r:'x<sub>cm</sub> = 5 m' },
    { n:'03', t:'¿Qué fuerza media se necesita para detener un objeto de 5 kg que va a 10 m/s en 0.5 s?',
      d:'F = Δp/Δt',
      r:'|F| = 100 N (en sentido opuesto)' },
    { n:'04', t:'Un coche de 1 200 kg pasa de 30 m/s a 0 en 5 s. ¿Cuál es la fuerza media de frenado?',
      d:'F = mΔv/Δt',
      r:'|F| = 7 200 N' },
    { n:'05', t:'¿Por qué los airbags reducen las lesiones en un choque?',
      d:'Pista: F·Δt = Δp; si Δp es fijo y Δt aumenta…',
      r:'Aumentan Δt, reduciendo la fuerza promedio sobre el cuerpo' },
    { n:'06', t:'Un cohete de 1 000 kg expulsa 10 kg de combustible a 200 m/s. ¿Cuál es el cambio de velocidad del cohete? (asume masa casi constante)',
      d:'Conservación: M·Δv = m·v<sub>gas</sub>',
      r:'Δv = 2 m/s' },
  ]},

];

/* ── Render ──────────────────────────────────────────────────────── */
const NUMERALS = ['i.', 'ii.', 'iii.', 'iv.', 'v.', 'vi.', 'vii.', 'viii.', 'ix.', 'x.'];
const CHEVRON  = '<svg class="exercise__chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>';

const root = document.getElementById('contenido');

SECCIONES.forEach((sec, sIdx) => {
  const sectionEl = document.createElement('section');
  sectionEl.innerHTML = `
    <header class="section-header">
      <h2 class="section-header__title">
        <span class="section-header__num">${NUMERALS[sIdx]}</span>
        ${sec.titulo}
      </h2>
      <span class="section-header__count">${sec.ejercicios.length} ejercicios</span>
    </header>
    <div class="exercise-list"></div>
  `;
  const list = sectionEl.querySelector('.exercise-list');

  sec.ejercicios.forEach(p => {
    const ex = document.createElement('details');
    ex.className = 'exercise';
    ex.innerHTML = `
      <summary class="exercise__summary">
        <span class="exercise__num">${p.n}</span>
        <div class="exercise__statement">
          <div class="exercise__text">${p.t}</div>
          <p class="exercise__hint">${p.d}</p>
        </div>
        ${CHEVRON}
      </summary>
      <div class="exercise__answer">
        <p class="exercise__answer-label">Respuesta</p>
        <p class="exercise__answer-text">${p.r}</p>
      </div>
    `;
    list.appendChild(ex);
  });

  root.appendChild(sectionEl);
});
</script>

</body>
</html>
