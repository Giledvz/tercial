name: Desplegar sitio estático a GitHub Pages

# El sitio es 100% estático (sin Jekyll). El builder legacy de Pages venía
# fallando de forma intermitente; este workflow arma el sitio y lo publica
# con la acción oficial de Pages (más confiable, sin Jekyll).
#
# ⚠️ NO se publica la raíz tal cual. Antes se subía `path: '.'`, lo que dejaba
# público TODO el repo: documentación interna, herramientas, generadores y
# —al fusionar la rama de rediseño— METODO.md con la estrategia de negocio.
# Ahora se copia el sitio a `_site/` EXCLUYENDO lo interno (lista abajo).
# Regla: si un archivo no le sirve al alumno, no se publica.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez; cancela los que queden atrás.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Armar _site (solo lo que le sirve al alumno)
        run: |
          set -euo pipefail
          rsync -a ./ _site/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitignore' \
            --exclude '_site' \
            `# — documentación y estrategia interna —` \
            --exclude 'METODO.md' \
            --exclude 'README.md' \
            --exclude 'design/' \
            `# — herramientas y generadores (no son del alumno) —` \
            --exclude 'migrar/' \
            --exclude 'tools/' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'node_modules/' \
            `# — prototipos: quitar esta línea cuando el rediseño esté listo —` \
            --exclude 'rediseno/' \
            `# — simulacros con errores: en revisión, NO publicar hasta corregir —` \
            --exclude 'examenes-pdf/simulacion-2024-v1.html' \
            --exclude 'examenes-pdf/simulacion-2024-v2.html' \
            --exclude 'examenes-pdf/img/simulacion-2024/' \
            `# — PDF de cálculo con errores y sin fuente editable: retirado hasta regenerar —` \
            --exclude 'calculo_diferencial_latex.pdf'
          # .nojekyll debe viajar sí o sí (evita que Pages procese con Jekyll)
          touch _site/.nojekyll
          echo "── se publica ──"
          find _site -maxdepth 1 | sort

      - name: Verificar que no se cuele nada interno
        run: |
          set -euo pipefail
          fugas=0
          # a · archivos/carpetas internas que nunca deben publicarse
          for p in METODO.md README.md package.json design migrar tools rediseno; do
            if [ -e "_site/$p" ]; then echo "❌ FUGA (archivo interno): _site/$p"; fugas=1; fi
          done
          # b · claves del profesor: ni marcadores ni archivos de respuestas
          #     (las claves viven SOLO en el repo privado tercial-claves)
          if grep -rlE 'clave-only|answer-final|is-clave|[?]clave=1|exam-clave' _site >/dev/null 2>&1; then
            echo "❌ FUGA (marcador de clave):"; grep -rlE 'clave-only|answer-final|is-clave|[?]clave=1|exam-clave' _site; fugas=1
          fi
          if find _site -name '*-respuestas.html' | grep -q .; then
            echo "❌ FUGA (archivo de respuestas):"; find _site -name '*-respuestas.html'; fugas=1
          fi
          [ "$fugas" -eq 0 ] && echo "✅ Sin archivos internos ni claves en _site"
          exit $fugas

      - name: Subir el sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
