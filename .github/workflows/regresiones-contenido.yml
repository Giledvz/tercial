name: Verificar regresiones de contenido

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verificar correcciones matemáticas auditadas
        run: npm run test:regresiones
