<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ejercicios — Física: Fluidos</title>
<style>
  :root { --borde:#d0d0cc; --gris:#f5f5f3; --muted:#777; --texto:#1a1a1a; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:Georgia,serif; color:var(--texto); background:#fff; max-width:700px; margin:0 auto; padding:1.5rem 1.1rem 4rem; line-height:1.65; }
  .portada { margin-bottom:2rem; border-bottom:2px solid #1a4f8a; padding-bottom:1rem; }
  .portada small { font-family:Arial,sans-serif; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1a4f8a; font-weight:700; }
  .portada h1 { font-size:1.45rem; font-weight:normal; color:#1a4f8a; margin:.2rem 0 .5rem; }
  .portada p { font-family:Arial,sans-serif; font-size:13px; color:var(--muted); }
  .banner { font-family:Arial,sans-serif; font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#fff; padding:5px 12px; border-radius:3px; display:inline-block; margin:1.8rem 0 .9rem; }
  .card { border:1px solid var(--borde); border-radius:6px; margin-bottom:.75rem; overflow:hidden; }
  .card-header { display:flex; align-items:center; gap:10px; padding:.85rem 1rem; cursor:pointer; -webkit-tap-highlight-color:transparent; user-select:none; background:#fff; }
  .card-header:active { background:var(--gris); }
  .num { font-family:Arial,sans-serif; font-size:11px; font-weight:700; color:var(--muted); min-width:22px; flex-shrink:0; }
  .enun { flex:1; }
  .enun p { font-size:15px; }
  .enun .datos { font-size:11px; color:var(--muted); margin-top:4px; border-left:2px solid var(--borde); padding-left:7px; }
  .chip { flex-shrink:0; font-family:Arial,sans-serif; font-size:12px; font-weight:700; border:1.5px solid currentColor; border-radius:4px; padding:4px 9px; background:transparent; cursor:pointer; line-height:1.3; -webkit-tap-highlight-color:transparent; }
  .chip:active { opacity:.6; }
  .panel { max-height:0; overflow:hidden; transition:max-height .25s ease; }
  .panel.open { max-height:200px; }
  .panel-inner { border-top:1px solid var(--borde); display:flex; align-items:center; justify-content:space-between; padding:.75rem 1rem .75rem 2.5rem; }
  .resp-pill { display:inline-flex; align-items:center; gap:9px; padding:7px 14px; border-radius:4px; color:#fff; }
  .resp-pill .tag { font-family:Arial,sans-serif; font-size:9px; font-weight:700; opacity:.8; text-transform:uppercase; letter-spacing:.07em; }
  .resp-pill .val { font-size:15px; font-weight:bold; }
  .ocultar { font-family:Arial,sans-serif; font-size:11px; font-weight:700; border:none; background:none; cursor:pointer; padding:0; -webkit-tap-highlight-color:transparent; }
  .footer { margin-top:2.5rem; padding-top:.75rem; border-top:1px solid var(--borde); font-family:Arial,sans-serif; font-size:11px; color:var(--muted); text-align:center; }
</style>
</head>
<body>

<div class="portada">
  <small>Ejercicios</small>
  <h1>Física: Fluidos</h1>
  <p>Resuelve cada ejercicio y toca <b>▸ R</b> para verificar tu respuesta. Usa <b>g = 10 m/s²</b> y <b>ρ<sub>agua</sub> = 1 000 kg/m³</b> salvo indicación contraria.</p>
</div>

<div id="contenido"></div>
<div class="footer">Física: Fluidos · Bachillerato</div>

<script>
const SECCIONES = [

  // ── 1. Densidad y peso específico ─────────────────────────────────────────
  { titulo:"1 · Densidad y peso específico", color:"#1a4f8a", ejercicios:[
    { n:"01", t:"Calcula la densidad de un cuerpo cuya masa es 600 g y su volumen 200 cm³.",
      d:"ρ = m/V",
      r:"ρ = 3 g/cm³ = 3 000 kg/m³" },
    { n:"02", t:"Determina la masa de 0.5 m³ de agua.",
      d:"m = ρV con ρ<sub>agua</sub> = 1 000 kg/m³",
      r:"m = 500 kg" },
    { n:"03", t:"Un cubo de aluminio de 5 cm de lado tiene una masa de 337.5 g. ¿Cuál es su densidad?",
      d:"V<sub>cubo</sub> = a³",
      r:"V = 125 cm³ &nbsp;·&nbsp; ρ = 2.7 g/cm³" },
    { n:"04", t:"La densidad del mercurio es 13 600 kg/m³. ¿Cuál es el volumen ocupado por 27.2 kg de mercurio?",
      d:"V = m/ρ",
      r:"V = 0.002 m³ = 2 L" },
    { n:"05", t:"Una pieza de 2 kg ocupa 250 cm³. Expresa su densidad en g/cm³ y en kg/m³.",
      d:"Cuidado con las unidades: 1 g/cm³ = 1 000 kg/m³",
      r:"ρ = 8 g/cm³ = 8 000 kg/m³" },
    { n:"06", t:"Calcula el peso específico (γ = ρg) del agua.",
      d:"Usa ρ = 1 000 kg/m³, g = 10 m/s²",
      r:"γ = 10 000 N/m³" },
    { n:"07", t:"En una probeta hay 80 g de un líquido en 100 mL. ¿Cuál es su densidad y a qué sustancia se parece?",
      d:"1 mL = 1 cm³",
      r:"ρ = 0.8 g/cm³ &nbsp;·&nbsp; similar al alcohol etílico" },
    { n:"08", t:"¿Cuál es la masa de 5 L de aceite si su densidad es 920 kg/m³?",
      d:"5 L = 0.005 m³",
      r:"m = 4.6 kg" },
  ]},

  // ── 2. Presión y presión hidrostática ─────────────────────────────────────
  { titulo:"2 · Presión hidrostática", color:"#5b2d8e", ejercicios:[
    { n:"01", t:"Una fuerza de 200 N actúa perpendicularmente sobre un área de 0.5 m². ¿Cuál es la presión?",
      d:"P = F/A",
      r:"P = 400 Pa" },
    { n:"02", t:"Calcula la presión hidrostática a 2 m de profundidad en agua.",
      d:"P = ρgh",
      r:"P = 20 000 Pa" },
    { n:"03", t:"¿A qué profundidad de un lago la presión hidrostática es de 50 000 Pa?",
      d:"h = P/(ρg)",
      r:"h = 5 m" },
    { n:"04", t:"Un buzo está a 30 m de profundidad. ¿Cuál es la presión total que soporta? (P<sub>atm</sub> = 100 000 Pa)",
      d:"P<sub>total</sub> = P<sub>atm</sub> + ρgh",
      r:"P = 400 000 Pa = 4 atm" },
    { n:"05", t:"La densidad del agua de mar es 1 030 kg/m³. ¿Cuál es la presión hidrostática a 100 m bajo el nivel del mar?",
      d:"Sólo presión hidrostática (no atmosférica)",
      r:"P ≈ 1 030 000 Pa ≈ 10.3 atm" },
    { n:"06", t:"Un tanque cilíndrico de 3 m de altura está lleno de agua. ¿Cuál es la presión hidrostática en su fondo?",
      d:"P = ρgh; no incluyas la atmosférica",
      r:"P = 30 000 Pa" },
    { n:"07", t:"Se aplica una fuerza de 80 N sobre un pistón de área 4 cm². ¿Qué presión ejerce?",
      d:"4 cm² = 0.0004 m²",
      r:"P = 200 000 Pa = 0.2 MPa" },
    { n:"08", t:"Calcula la presión en la base de una columna de mercurio de 76 cm. (ρ<sub>Hg</sub> = 13 600 kg/m³)",
      d:"P = ρgh con h en metros",
      r:"P ≈ 103 360 Pa ≈ 1 atm" },
    { n:"09", t:"Una presión de 5 000 Pa se aplica sobre un área de 0.2 m². ¿Cuál es la fuerza ejercida?",
      d:"F = PA",
      r:"F = 1 000 N" },
    { n:"10", t:"Una piscina mide 4 m de profundidad. ¿Cuál es la diferencia de presión entre el fondo y la superficie?",
      d:"ΔP = ρgh",
      r:"ΔP = 40 000 Pa" },
  ]},

  // ── 3. Principio de Pascal ────────────────────────────────────────────────
  { titulo:"3 · Principio de Pascal", color:"#047857", ejercicios:[
    { n:"01", t:"En una prensa hidráulica el pistón pequeño tiene 10 cm² y el grande 200 cm². Si en el pequeño se aplican 50 N, ¿qué fuerza se obtiene en el grande?",
      d:"F₁/A₁ = F₂/A₂",
      r:"F₂ = 1 000 N" },
    { n:"02", t:"Una prensa hidráulica tiene pistones de 5 cm² y 100 cm². ¿Qué fuerza hay que aplicar en el pequeño para levantar un coche que pesa 8 000 N?",
      d:"F₁ = F₂·(A₁/A₂)",
      r:"F₁ = 400 N" },
    { n:"03", t:"En una prensa hidráulica con relación de áreas 1:50, ¿qué fuerza en el pistón pequeño se necesita para levantar 1 500 N en el grande?",
      d:"F₁ = F₂/50",
      r:"F₁ = 30 N" },
    { n:"04", t:"Pistón pequeño de 2 cm² y grande de 100 cm². Si el pequeño baja 20 cm, ¿cuánto sube el grande?",
      d:"Conservación de volumen: A₁d₁ = A₂d₂",
      r:"d₂ = 0.4 cm" },
    { n:"05", t:"¿Qué presión se transmite al fluido si se aplican 600 N sobre un pistón de 3 cm²?",
      d:"P = F/A; 3 cm² = 3×10⁻⁴ m²",
      r:"P = 2 000 000 Pa = 2 MPa" },
    { n:"06", t:"En una prensa el pistón pequeño tiene radio 1 cm y el grande radio 10 cm. ¿Cuál es la ventaja mecánica?",
      d:"VM = A₂/A₁ = (r₂/r₁)²",
      r:"VM = 100" },
    { n:"07", t:"Se aplican 25 N sobre el pistón pequeño (5 cm²). ¿Qué peso máximo puede levantarse en el pistón grande de 200 cm²?",
      d:"F₂ = F₁·(A₂/A₁)",
      r:"F₂ = 1 000 N" },
    { n:"08", t:"En una prensa hidráulica el pistón pequeño se desplaza 30 cm para que el grande suba 6 cm. ¿Cuál es la relación A₂/A₁?",
      d:"A₁d₁ = A₂d₂",
      r:"A₂/A₁ = 5" },
  ]},

  // ── 4. Principio de Arquímedes y flotación ────────────────────────────────
  { titulo:"4 · Principio de Arquímedes", color:"#b45309", ejercicios:[
    { n:"01", t:"Un cuerpo de 200 cm³ se sumerge totalmente en agua. ¿Cuál es el empuje?",
      d:"E = ρ<sub>fluido</sub>·V<sub>sum</sub>·g; 200 cm³ = 2×10⁻⁴ m³",
      r:"E = 2 N" },
    { n:"02", t:"Un objeto de 2 kg pesa aparentemente 14 N cuando se sumerge en agua. ¿Cuál es el empuje?",
      d:"E = peso real − peso aparente",
      r:"Peso real = 20 N &nbsp;·&nbsp; E = 6 N" },
    { n:"03", t:"¿Cuál es el empuje sobre una pelota de 500 cm³ totalmente sumergida en agua?",
      d:"E = ρVg",
      r:"E = 5 N" },
    { n:"04", t:"Una piedra de 4 kg ocupa un volumen de 1 500 cm³. ¿Cuál es su peso aparente al sumergirla en agua?",
      d:"P<sub>ap</sub> = mg − E",
      r:"P = 40 N &nbsp;·&nbsp; E = 15 N &nbsp;·&nbsp; P<sub>ap</sub> = 25 N" },
    { n:"05", t:"Un bloque de 800 cm³ tiene densidad 600 kg/m³. ¿Flota o se hunde en agua?",
      d:"Compara ρ del cuerpo con ρ del agua",
      r:"Flota (ρ<sub>cuerpo</sub> &lt; ρ<sub>agua</sub>)" },
    { n:"06", t:"¿Qué fracción de un iceberg sobresale del agua de mar? (ρ<sub>hielo</sub> = 920 kg/m³, ρ<sub>mar</sub> = 1 030 kg/m³)",
      d:"Fracción sumergida = ρ<sub>hielo</sub> / ρ<sub>mar</sub>",
      r:"Sumergido ≈ 89.3 % &nbsp;·&nbsp; sobresale ≈ 10.7 %" },
    { n:"07", t:"Un objeto flota con el 60 % de su volumen sumergido en agua. ¿Cuál es su densidad?",
      d:"ρ<sub>cuerpo</sub> = (V<sub>sum</sub>/V<sub>tot</sub>)·ρ<sub>fluido</sub>",
      r:"ρ = 600 kg/m³" },
    { n:"08", t:"Un cuerpo pesa 50 N en aire y 40 N sumergido en agua. ¿Cuál es su volumen?",
      d:"V = E/(ρg)",
      r:"E = 10 N &nbsp;·&nbsp; V = 0.001 m³ = 1 000 cm³" },
    { n:"09", t:"Un cubo de madera de 10 cm de lado y densidad 700 kg/m³ flota en agua. ¿Qué altura del cubo sobresale?",
      d:"Fracción sumergida = ρ<sub>madera</sub>/ρ<sub>agua</sub>",
      r:"Sumergido = 7 cm &nbsp;·&nbsp; sobresale = 3 cm" },
    { n:"10", t:"Un objeto de 0.5 kg y densidad 200 kg/m³ está totalmente sumergido en agua. ¿Cuál es la fuerza neta sobre él?",
      d:"F<sub>neta</sub> = E − Peso",
      r:"V = 0.0025 m³ &nbsp;·&nbsp; E = 25 N &nbsp;·&nbsp; F<sub>neta</sub> = 20 N (hacia arriba)" },
  ]},

  // ── 5. Continuidad y Bernoulli ────────────────────────────────────────────
  { titulo:"5 · Continuidad y Bernoulli", color:"#a44a3f", ejercicios:[
    { n:"01", t:"Por una tubería de 4 cm² de sección fluye agua a 5 m/s. ¿Cuál es el caudal?",
      d:"Q = Av; 4 cm² = 4×10⁻⁴ m²",
      r:"Q = 2×10⁻³ m³/s = 2 L/s" },
    { n:"02", t:"Una tubería se estrecha de 8 cm² a 2 cm². Si en la parte ancha el agua va a 3 m/s, ¿con qué velocidad sale en la parte estrecha?",
      d:"Continuidad: A₁v₁ = A₂v₂",
      r:"v₂ = 12 m/s" },
    { n:"03", t:"En una tubería el radio pasa de 0.10 m a 0.05 m. ¿Cuántas veces más rápido va el agua en la parte estrecha?",
      d:"A ∝ r²; (r₁/r₂)²",
      r:"4 veces más rápido" },
    { n:"04", t:"Calcula el caudal en una tubería de área 0.02 m² por la que fluye agua a 2 m/s.",
      d:"Q = Av",
      r:"Q = 0.04 m³/s" },
    { n:"05", t:"Por un grifo de área 5 cm² sale agua con un caudal de 0.5 L/s. ¿Cuál es la velocidad de salida?",
      d:"v = Q/A; 0.5 L/s = 5×10⁻⁴ m³/s",
      r:"v = 1 m/s" },
    { n:"06", t:"En una tubería horizontal: en el punto 1, P₁ = 200 000 Pa y v₁ = 2 m/s; en el punto 2, v₂ = 4 m/s. Calcula P₂ por Bernoulli.",
      d:"P₁ + ½ρv₁² = P₂ + ½ρv₂² (misma altura)",
      r:"P₂ = 194 000 Pa" },
    { n:"07", t:"Un tanque abierto contiene agua. ¿Con qué velocidad sale el agua por un orificio en el fondo si el nivel está 5 m arriba? (Torricelli)",
      d:"v = √(2gh)",
      r:"v = 10 m/s" },
    { n:"08", t:"Por un tubo de 2 cm² de sección sale agua a 6 m/s. ¿Cuál es el caudal?",
      d:"Q = Av",
      r:"Q = 1.2×10⁻³ m³/s = 1.2 L/s" },
  ]},

];

// ── Render ────────────────────────────────────────────────────────────────────
const root = document.getElementById('contenido');

SECCIONES.forEach(sec => {
  const banner = document.createElement('div');
  banner.className = 'banner';
  banner.style.background = sec.color;
  banner.textContent = sec.titulo;
  root.appendChild(banner);

  sec.ejercicios.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <span class="num">${p.n}</span>
        <div class="enun">
          <p>${p.t}</p>
          <p class="datos">${p.d}</p>
        </div>
        <button class="chip" style="color:${sec.color};border-color:${sec.color}">▸ R</button>
      </div>
      <div class="panel">
        <div class="panel-inner">
          <div class="resp-pill" style="background:${sec.color}">
            <span class="tag">Respuesta</span>
            <span class="val">${p.r}</span>
          </div>
          <button class="ocultar" style="color:${sec.color}">▴ Ocultar</button>
        </div>
      </div>
    `;
    root.appendChild(card);

    const hdr     = card.querySelector('.card-header');
    const panel   = card.querySelector('.panel');
    const btn     = card.querySelector('.chip');
    const ocultar = card.querySelector('.ocultar');

    function abrir()  { panel.classList.add('open');    btn.textContent = '▾ R'; }
    function cerrar() { panel.classList.remove('open'); btn.textContent = '▸ R'; card.scrollIntoView({behavior:'smooth',block:'nearest'}); }

    hdr.addEventListener('click', e => { if (e.target===btn||e.target===ocultar) return; panel.classList.contains('open')?cerrar():abrir(); });
    btn.addEventListener('click', e => { e.stopPropagation(); panel.classList.contains('open')?cerrar():abrir(); });
    ocultar.addEventListener('click', cerrar);
  });
});
</script>
</body>
</html>
