<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="description" content="Factos — datos duros que van sí o sí: conceptos, fechas y clasificaciones para memorizar al 100 %. Tercial, preparación COMIPEMS.">
<title>Factos · Tercial</title>

<script>
  /* Anti-flash · ver design-system § 11 */
  (function () {
    var p = localStorage.getItem('tercial-theme-pref') || 'auto';
    var d = p === 'auto'
      ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
      : p;
    var r = document.documentElement;
    r.setAttribute('data-theme', d);
    r.setAttribute('data-theme-pref', p);
  })();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap">

<link rel="stylesheet" href="/tercial/assets/css/tokens.css">
<link rel="stylesheet" href="/tercial/assets/css/base.css">
<link rel="stylesheet" href="/tercial/assets/css/components.css">
<link rel="stylesheet" href="/tercial/assets/css/study.css">

<script defer src="/tercial/assets/js/theme.js"></script>
<script defer src="/tercial/assets/js/site-nav.js"></script>
<script defer src="/tercial/assets/js/katex-loader.js"></script>
<script defer src="/tercial/assets/js/factos.js"></script>
</head>
<body>

<site-nav></site-nav>

<main class="study">
  <header class="study__hero">
    <p class="study__eyebrow">Modo de estudio · memoria</p>
    <h1 class="study__title"><em>Factos</em></h1>
    <p class="study__lede">Datos que van <strong>sí o sí</strong>: conceptos, fechas, clasificaciones. Pásalos y dilos con tus palabras. Pura memoria.</p>
  </header>

  <div class="factos__filtros" id="filtros" role="group" aria-label="Filtrar por materia"></div>

  <div class="study__marcador" aria-live="polite">
    <span>Carta <strong id="m-pos">0</strong> / <span id="m-total">0</span></span>
  </div>

  <section class="study__card" id="card" aria-live="polite"></section>
</main>

<script>
(function () {
  'use strict';
  function ready(fn){ document.readyState === 'loading' ? document.addEventListener('DOMContentLoaded', fn) : fn(); }

  /* Etiquetas legibles por materia. Si agregas una materia nueva en
     factos.js, añádela aquí para que salga bonita en la tarjeta. */
  var LABELS = {
    fisica: 'Física', quimica: 'Química', biologia: 'Biología',
    historia: 'Historia', geografia: 'Geografía', civismo: 'Civismo',
    matematicas: 'Matemáticas', espanol: 'Español'
  };
  function labelMateria(m) {
    return LABELS[m] || (m ? m.charAt(0).toUpperCase() + m.slice(1) : '');
  }

  ready(function () {
    var card = document.getElementById('card');
    var FACTOS = (window.FACTOS || []).filter(function (f) { return f && f.afirmacion; });

    if (!FACTOS.length) {
      card.innerHTML = '<p class="study__pregunta">No se pudo cargar el banco de afirmaciones.</p>';
      return;
    }

    /* KaTeX por si una afirmación trae $...$ (la mayoría es prosa con Unicode). */
    if (window.ClasesKatex) window.ClasesKatex.load();
    function renderMath(el, tries) {
      tries = tries || 0;
      if (window.renderMathInElement) {
        try { window.renderMathInElement(el, { delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false }
        ], throwOnError: false }); } catch (e) {}
      } else if (tries < 40) {
        setTimeout(function () { renderMath(el, tries + 1); }, 120);
      }
    }
    function shuffle(a) {
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }

    /* Materias presentes, en orden de aparición. */
    var materias = [];
    (function () {
      var seen = {};
      FACTOS.forEach(function (f) { if (f.materia && !seen[f.materia]) { seen[f.materia] = 1; materias.push(f.materia); } });
    })();

    var filtro = 'todas';   // 'todas' | <materia>
    var deck = [];          // índices dentro de FACTOS, barajados
    var pos = 0;

    function construyeDeck() {
      var arr = FACTOS.map(function (_, i) { return i; });
      if (filtro !== 'todas') {
        arr = arr.filter(function (i) { return FACTOS[i].materia === filtro; });
      }
      return shuffle(arr);
    }

    function nuevaTanda(f) {
      if (f) filtro = f;
      deck = construyeDeck();
      pos = 0;
      pintaChips();
      if (!deck.length) { return; }
      pinta();
    }

    function chip(val, txt, n) {
      var act = (filtro === val) ? ' es-activo' : '';
      return '<button type="button" class="factos__chip' + act + '" data-f="' + val + '">' +
        txt + ' <span class="factos__chip-n">' + n + '</span></button>';
    }
    function pintaChips() {
      var cont = document.getElementById('filtros');
      var chips = [chip('todas', 'Todas', FACTOS.length)];
      materias.forEach(function (m) {
        var n = FACTOS.filter(function (f) { return f.materia === m; }).length;
        chips.push(chip(m, labelMateria(m), n));
      });
      cont.innerHTML = chips.join('');
      cont.querySelectorAll('.factos__chip').forEach(function (b) {
        b.addEventListener('click', function () { nuevaTanda(b.getAttribute('data-f')); });
      });
    }

    function pintaMarcador() {
      document.getElementById('m-pos').textContent = deck.length ? (pos + 1) : 0;
      document.getElementById('m-total').textContent = deck.length;
    }

    function pinta() {
      var f = FACTOS[deck[pos]];
      card.innerHTML =
        '<p class="study__tema">' + labelMateria(f.materia) + (f.tema ? ' · ' + f.tema : '') + '</p>' +
        '<p class="factos__afirmacion">' + f.afirmacion + '</p>' +
        (f.nota ? '<p class="factos__nota">' + f.nota + '</p>' : '') +
        '<div class="study__acciones factos__nav">' +
          '<button type="button" class="study__btn study__btn--ghost" id="btn-prev"' + (pos === 0 ? ' disabled' : '') + '>← Anterior</button>' +
          '<button type="button" class="study__btn" id="btn-next">' +
            (pos === deck.length - 1 ? 'Terminar →' : 'Siguiente →') + '</button>' +
        '</div>';
      renderMath(card);
      pintaMarcador();
      document.getElementById('btn-prev').addEventListener('click', prev);
      document.getElementById('btn-next').addEventListener('click', next);
    }

    function prev() { if (pos > 0) { pos--; pinta(); } }
    function next() { if (pos < deck.length - 1) { pos++; pinta(); } else { cierre(); } }

    function cierre() {
      card.innerHTML =
        '<div class="study__cierre">' +
          '<p class="study__cierre-num">' + deck.length + '</p>' +
          '<p class="study__cierre-frase">Viste toda la tanda.</p>' +
          '<div class="study__acciones" style="justify-content:center;">' +
            '<button type="button" class="study__btn" id="c-otra">Volver a empezar</button>' +
          '</div>' +
        '</div>';
      pintaMarcador();
      document.getElementById('c-otra').addEventListener('click', function () { nuevaTanda(filtro); });
    }

    /* Teclado: ← anterior · → / Enter / Espacio siguiente. */
    document.addEventListener('keydown', function (ev) {
      var tag = (document.activeElement && document.activeElement.tagName) || '';
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      if (ev.key === 'ArrowRight' || ev.key === 'Enter' || ev.key === ' ') {
        var n = document.getElementById('btn-next'); if (n) { ev.preventDefault(); n.click(); }
      } else if (ev.key === 'ArrowLeft') {
        var p = document.getElementById('btn-prev'); if (p && !p.disabled) { ev.preventDefault(); p.click(); }
      }
    });

    nuevaTanda('todas');
  });
})();
</script>

</body>
</html>
