<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="description" content="Descarta los dos — entrena a eliminar las opciones imposibles antes de responder. Tercial, preparación COMIPEMS.">
<title>Descarta los dos · Tercial</title>

<script>
  /* Anti-flash · ver design-system § 11 */
  (function () {
    var p = localStorage.getItem('tercial-theme-pref') || 'auto';
    var d = p === 'auto'
      ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
      : p;
    var r = document.documentElement;
    r.setAttribute('data-theme', d);
    r.setAttribute('data-theme-pref', p);
  })();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap">

<link rel="stylesheet" href="/tercial/assets/css/tokens.css">
<link rel="stylesheet" href="/tercial/assets/css/base.css">
<link rel="stylesheet" href="/tercial/assets/css/components.css">
<link rel="stylesheet" href="/tercial/assets/css/study.css">

<script defer src="/tercial/assets/js/theme.js"></script>
<script defer src="/tercial/assets/js/site-nav.js"></script>
<script defer src="/tercial/assets/js/katex-loader.js"></script>
<script defer src="/tercial/assets/js/banco.js"></script>
</head>
<body>

<site-nav></site-nav>

<main class="study">
  <header class="study__hero">
    <p class="study__eyebrow">Modo de estudio · descarte</p>
    <h1 class="study__title">Descarta <em>los dos</em></h1>
    <p class="study__lede">No elijas la correcta: tacha las <strong>dos que sean imposibles</strong>. Cada descarte limpio te sube de 25&nbsp;% a 50&nbsp;% de acertar — la jugada más rentable del examen.</p>
  </header>

  <div class="study__marcador" aria-live="polite">
    <span>Descartes limpios: <strong id="m-limpios">0</strong> / <span id="m-total">0</span></span>
    <span id="m-racha"></span>
  </div>

  <section class="study__card" id="card" aria-live="polite"></section>
</main>

<script>
(function () {
  'use strict';
  function ready(fn){ document.readyState === 'loading' ? document.addEventListener('DOMContentLoaded', fn) : fn(); }

  ready(function () {
    var BANCO = (window.BANCO || []).filter(function (q) {
      return q.opciones && q.opciones.length === 4 && typeof q.correcta === 'number';
    });
    var card = document.getElementById('card');

    if (!BANCO.length) {
      card.innerHTML = '<p class="study__pregunta">No se pudo cargar el banco de preguntas.</p>';
      return;
    }

    /* KaTeX: cargar una vez, re-render por pregunta con guard de reintentos
       (ver memoria del loader: load() sin opts + guard). */
    if (window.ClasesKatex) window.ClasesKatex.load();
    function renderMath(el, tries) {
      tries = tries || 0;
      if (window.renderMathInElement) {
        try { window.renderMathInElement(el, { delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false }
        ], throwOnError: false }); } catch (e) {}
      } else if (tries < 40) {
        setTimeout(function () { renderMath(el, tries + 1); }, 120);
      }
    }

    function shuffle(a) {
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }

    var orden = shuffle(BANCO.map(function (_, i) { return i; }));
    var pos = 0;
    var limpios = 0, total = 0, racha = 0;
    var mejor = +(localStorage.getItem('descarta.mejorRacha') || 0);

    var fase = 'sel';       // 'sel' | 'rev'
    var opcionesOrden = []; // mapeo de display→original
    var correctaDisp = 0;   // índice mostrado de la correcta
    var tachadas = [];      // índices mostrados tachados

    function preguntaActual() { return BANCO[orden[pos % orden.length]]; }

    function pintaMarcador() {
      document.getElementById('m-limpios').textContent = limpios;
      document.getElementById('m-total').textContent = total;
      var r = document.getElementById('m-racha');
      if (racha >= 2) r.innerHTML = '<span class="racha-viva">racha · ' + racha + '</span>';
      else if (mejor >= 2) r.textContent = 'mejor racha · ' + mejor;
      else r.textContent = '';
    }

    function nuevaPregunta() {
      fase = 'sel';
      tachadas = [];
      var q = preguntaActual();
      var idx = shuffle(q.opciones.map(function (_, i) { return i; }));
      opcionesOrden = idx;
      correctaDisp = idx.indexOf(q.correcta);

      var ops = idx.map(function (origIdx, d) {
        return '<button type="button" class="study__opcion" data-d="' + d + '">' +
          '<span class="study__tecla">' + (d + 1) + '</span>' +
          '<span class="study__opcion-txt">' + q.opciones[origIdx] + '</span>' +
          '<span class="study__marca" aria-hidden="true"></span></button>';
      }).join('');

      card.innerHTML =
        '<p class="study__tema">' + (q.materia || '') + (q.tema ? ' · ' + q.tema : '') + '</p>' +
        '<p class="study__instruccion">Tacha las 2 opciones imposibles</p>' +
        '<p class="study__pregunta">' + q.pregunta + '</p>' +
        '<div class="study__opciones">' + ops + '</div>' +
        '<div class="study__acciones">' +
          '<button type="button" class="study__btn" id="btn-accion" disabled>Descartar</button>' +
          '<span class="study__hint" id="hint">Toca 2 · luego Enter</span>' +
        '</div>' +
        '<div id="feedback"></div>';

      renderMath(card);
      card.querySelectorAll('.study__opcion').forEach(function (b) {
        b.addEventListener('click', function () { toggle(+b.getAttribute('data-d')); });
      });
      document.getElementById('btn-accion').addEventListener('click', accion);
    }

    function toggle(d) {
      if (fase !== 'sel') return;
      var i = tachadas.indexOf(d);
      if (i >= 0) tachadas.splice(i, 1);
      else if (tachadas.length < 2) tachadas.push(d);
      // repintar tachado
      card.querySelectorAll('.study__opcion').forEach(function (b) {
        b.classList.toggle('es-tachada', tachadas.indexOf(+b.getAttribute('data-d')) >= 0);
      });
      var btn = document.getElementById('btn-accion');
      btn.disabled = tachadas.length !== 2;
      document.getElementById('hint').textContent = tachadas.length === 2 ? 'Enter para confirmar' : 'Toca ' + (2 - tachadas.length) + ' más';
    }

    function accion() {
      if (fase === 'sel') revelar();
      else { pos++; nuevaPregunta(); }
    }

    function revelar() {
      if (tachadas.length !== 2) return;
      fase = 'rev';
      var q = preguntaActual();
      var limpio = tachadas.indexOf(correctaDisp) === -1; // no tachó la correcta
      total++;
      if (limpio) { limpios++; racha++; if (racha > mejor) { mejor = racha; localStorage.setItem('descarta.mejorRacha', mejor); } }
      else { racha = 0; }
      pintaMarcador();

      var botones = card.querySelectorAll('.study__opcion');
      botones.forEach(function (b) {
        var d = +b.getAttribute('data-d');
        b.disabled = true;
        var marca = b.querySelector('.study__marca');
        if (d === correctaDisp) {
          if (tachadas.indexOf(d) >= 0) { b.classList.remove('es-tachada'); b.classList.add('es-error'); marca.textContent = '✗ era la buena'; }
          else { b.classList.add('es-correcta'); marca.textContent = '✓ correcta'; }
        }
      });

      var fb = document.getElementById('feedback');
      var ver = limpio
        ? '<p class="study__veredicto es-bien">Descarte <em>limpio</em>. Dejaste viva la correcta — vas a 50&nbsp;%.</p>'
        : '<p class="study__veredicto es-mal">Cuidado: tachaste la buena. Te ganó el distractor.</p>';
      fb.innerHTML = ver +
        (q.explicacion ? '<p class="study__explica">' + q.explicacion + '</p>' : '');
      renderMath(fb);

      var btn = document.getElementById('btn-accion');
      btn.disabled = false;
      btn.textContent = 'Siguiente →';
      document.getElementById('hint').textContent = 'Enter para la siguiente';
    }

    /* Teclado: 1-4 tachan, Enter confirma/avanza. Un solo listener global. */
    document.addEventListener('keydown', function (ev) {
      var tag = (document.activeElement && document.activeElement.tagName) || '';
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      if (/^[1-4]$/.test(ev.key)) { ev.preventDefault(); toggle(+ev.key - 1); }
      else if (ev.key === 'Enter') { ev.preventDefault(); var b = document.getElementById('btn-accion'); if (b && !b.disabled) b.click(); }
    });

    pintaMarcador();
    nuevaPregunta();
  });
})();
</script>

</body>
</html>
